name: PromptShield CI/CD\n\non:\n  push:\n    branches: [main]\n  pull_request:\n    branches: [main]\n\njobs:\n  lint:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v4\n      - name: Set up Python\n        uses: actions/setup-python@v5\n        with:\n          python-version: "3.11"\n      - name: Install dependencies\n        run: |\n          pip install black flake8\n      - name: Run Black (format check)\n        run: black --check .\n      - name: Run Flake8 (lint check)\n        run: flake8 .\n\n  test-api:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v4\n      - name: Test /shield endpoint\n        run: |\n          curl -s "http://8.130.44.168/shield" \n            -X POST \n            -H "Content-Type: application/json" \n            -d "{\"prompt\":\"test\"}" \n            | jq -e ".safe != null" > /dev/null || exit 1\n        env:\n          CURL_TIMEOUT: 10
