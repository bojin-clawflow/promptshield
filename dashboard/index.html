<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PromptShield Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body{background:#0f172a}</style>
</head>
<body class="text-gray-200 min-h-screen">
  <header class="border-b border-gray-800 px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <svg class="w-8 h-8 text-blue-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l7 4v6c0 5.25-3.5 9.74-7 11-3.5-1.26-7-5.75-7-11V6l7-4z"/></svg>
      <h1 class="text-xl font-semibold text-white">PromptShield Dashboard</h1>
    </div>
    <div class="flex items-center gap-2 text-sm">
      <span id="statusDot" class="w-2.5 h-2.5 rounded-full bg-red-500"></span>
      <span id="statusText" class="text-gray-400">Disconnected</span>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-8 space-y-8">
    <!-- Stats Cards -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
      <div class="bg-gray-800/50 rounded-lg p-5 border border-gray-700/50">
        <p class="text-sm text-gray-400">Total Requests</p>
        <p id="statRequests" class="text-2xl font-bold text-white mt-1">--</p>
      </div>
      <div class="bg-gray-800/50 rounded-lg p-5 border border-gray-700/50">
        <p class="text-sm text-gray-400">Blocked Threats</p>
        <p id="statBlocked" class="text-2xl font-bold text-red-400 mt-1">--</p>
      </div>
      <div class="bg-gray-800/50 rounded-lg p-5 border border-gray-700/50">
        <p class="text-sm text-gray-400">Avg Latency</p>
        <p id="statLatency" class="text-2xl font-bold text-blue-400 mt-1">--</p>
      </div>
      <div class="bg-gray-800/50 rounded-lg p-5 border border-gray-700/50">
        <p class="text-sm text-gray-400">Detection Rate</p>
        <p id="statRate" class="text-2xl font-bold text-emerald-400 mt-1">--</p>
      </div>
    </div>

    <!-- Test Prompt -->
    <section class="bg-gray-800/50 rounded-lg border border-gray-700/50 p-6">
      <h2 class="text-lg font-semibold text-white mb-4">Test Prompt</h2>
      <textarea id="promptInput" rows="3" placeholder="Enter a prompt to analyze..."
        class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-gray-200 text-sm resize-none focus:outline-none focus:border-blue-500"></textarea>
      <div class="flex items-center gap-4 mt-3">
        <button id="analyzeBtn" onclick="analyzePrompt()"
          class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-5 py-2 rounded-lg transition">Analyze</button>
        <div id="analyzeResult" class="text-sm"></div>
      </div>
    </section>

    <!-- Recent Activity -->
    <section class="bg-gray-800/50 rounded-lg border border-gray-700/50 p-6">
      <h2 class="text-lg font-semibold text-white mb-4">Recent Activity</h2>
      <div class="overflow-x-auto">
        <table class="w-full text-sm text-left">
          <thead class="text-gray-400 border-b border-gray-700">
            <tr>
              <th class="pb-3 pr-4">Timestamp</th>
              <th class="pb-3 pr-4">Prompt</th>
              <th class="pb-3 pr-4">Result</th>
              <th class="pb-3 pr-4">Score</th>
              <th class="pb-3">Threats</th>
            </tr>
          </thead>
          <tbody id="activityBody" class="text-gray-300"></tbody>
        </table>
        <p id="noActivity" class="text-gray-500 text-sm py-4 text-center">No activity recorded yet.</p>
      </div>
    </section>
  </main>

  <script>
    const activity = [];

    async function fetchStats() {
      try {
        const [statsRes, healthRes] = await Promise.all([
          fetch('/v1/stats'), fetch('/v1/health')
        ]);
        if (!statsRes.ok || !healthRes.ok) throw new Error('API error');
        const stats = await statsRes.json();
        document.getElementById('statRequests').textContent = (stats.total_requests ?? 0).toLocaleString();
        document.getElementById('statBlocked').textContent = (stats.blocked_threats ?? 0).toLocaleString();
        document.getElementById('statLatency').textContent = (stats.avg_latency_ms ?? 0).toFixed(1) + ' ms';
        const rate = stats.detection_rate ?? 0;
        document.getElementById('statRate').textContent = (typeof rate === 'number' ? rate : 0).toFixed(1) + '%';
        setStatus(true);
      } catch {
        setStatus(false);
      }
    }

    function setStatus(connected) {
      const dot = document.getElementById('statusDot');
      const txt = document.getElementById('statusText');
      dot.className = 'w-2.5 h-2.5 rounded-full ' + (connected ? 'bg-emerald-500' : 'bg-red-500');
      txt.textContent = connected ? 'Connected' : 'Disconnected';
    }

    async function analyzePrompt() {
      const input = document.getElementById('promptInput');
      const btn = document.getElementById('analyzeBtn');
      const result = document.getElementById('analyzeResult');
      const text = input.value.trim();
      if (!text) return;

      btn.disabled = true;
      btn.textContent = 'Analyzing...';
      result.textContent = '';

      try {
        const res = await fetch('/v1/shield', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt: text })
        });
        if (!res.ok) throw new Error('Request failed');
        const data = await res.json();
        const safe = data.result === 'safe';
        const score = (data.score ?? 0).toFixed(2);
        const threats = data.threats?.length ? data.threats.join(', ') : 'None';

        result.innerHTML = `<span class="${safe ? 'text-emerald-400' : 'text-red-400'} font-medium">${safe ? 'SAFE' : 'UNSAFE'}</span>` +
          ` &middot; Score: ${score} &middot; Threats: ${threats}`;

        activity.unshift({
          time: new Date().toLocaleTimeString(),
          prompt: text.length > 60 ? text.slice(0, 57) + '...' : text,
          result: data.result, score, threats
        });
        if (activity.length > 20) activity.pop();
        renderActivity();
      } catch {
        result.innerHTML = '<span class="text-red-400">Error: Could not reach API</span>';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Analyze';
      }
    }

    function renderActivity() {
      const tbody = document.getElementById('activityBody');
      const noAct = document.getElementById('noActivity');
      if (!activity.length) { noAct.classList.remove('hidden'); tbody.innerHTML = ''; return; }
      noAct.classList.add('hidden');
      tbody.innerHTML = activity.map(a => {
        const safe = a.result === 'safe';
        return `<tr class="border-b border-gray-700/50">
          <td class="py-2.5 pr-4 text-gray-400 whitespace-nowrap">${esc(a.time)}</td>
          <td class="py-2.5 pr-4 max-w-xs truncate">${esc(a.prompt)}</td>
          <td class="py-2.5 pr-4"><span class="px-2 py-0.5 rounded text-xs font-medium ${safe ? 'bg-emerald-500/20 text-emerald-400' : 'bg-red-500/20 text-red-400'}">${safe ? 'Safe' : 'Unsafe'}</span></td>
          <td class="py-2.5 pr-4">${esc(a.score)}</td>
          <td class="py-2.5">${esc(a.threats)}</td>
        </tr>`;
      }).join('');
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    fetchStats();
    setInterval(fetchStats, 5000);

    document.getElementById('promptInput').addEventListener('keydown', e => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) analyzePrompt();
    });
  </script>
</body>
</html>
